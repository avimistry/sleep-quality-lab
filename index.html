<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{SITE_NAME}} — {{SITE_TAGLINE}}</title>
  <meta name="description" content="{{SITE_META_DESCRIPTION}}">
  <meta name="robots" content="index, follow, max-image-preview:large">
  <link rel="canonical" href="https://{{DOMAIN}}/">
  <meta property="og:title" content="{{SITE_NAME}}">
  <meta property="og:description" content="{{SITE_META_DESCRIPTION}}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://{{DOMAIN}}/">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header>
    <nav class="site-nav">
      <a href="/" class="site-logo">{{SITE_NAME}}</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>{{SITE_TAGLINE}}</h1>
      <p>{{SITE_INTRO_SENTENCE}}</p>
    </section>

    <section class="post-grid">
      <h2>Latest articles</h2>
      <div class="grid">
        <!-- Paste one .post-card block per published article -->
        <article class="post-card">
          <a href="posts/{{SLUG}}">
            <img src="assets/img/{{SLUG}}.webp" alt="{{IMAGE_ALT}}" width="600" height="315" loading="lazy">
            <h3>{{POST_TITLE}}</h3>
            <p>{{POST_EXCERPT}}</p>
          </a>
        </article>
      </div>
    </section>
  </main>

  <footer>
    <p>© {{YEAR}} {{SITE_NAME}} ·
      <a href="/privacy.html">Privacy</a> ·
      <a href="/disclosure.html">Disclosure</a>
    </p>
  </footer>
</body>
</html>
