<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sleep Quality Lab — Insomnia-free living without medication</title>
  <meta name="description" content="{{SITE_META_DESCRIPTION}}">
  <meta name="robots" content="index, follow, max-image-preview:large">
  <link rel="canonical" href="https://sleep-quality-lab.gnan.space/">
  <meta property="og:title" content="Sleep Quality Lab">
  <meta property="og:description" content="{{SITE_META_DESCRIPTION}}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://sleep-quality-lab.gnan.space/">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header>
    <nav class="site-nav">
      <a href="/" class="site-logo">Sleep Quality Lab</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>Insomnia-free living without medication</h1>
      <p>{{SITE_INTRO_SENTENCE}}</p>
    </section>

    <section class="post-grid">
      <h2>Latest articles</h2>
      <div class="grid">
        <!-- Paste one .post-card block per published article -->
        <article class="post-card">
          <a href="posts/{{SLUG}}">
            <img src="assets/img/{{SLUG}}.webp" alt="{{IMAGE_ALT}}" width="600" height="315" loading="lazy">
            <h3>{{POST_TITLE}}</h3>
            <p>{{POST_EXCERPT}}</p>
          </a>
        </article>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 Sleep Quality Lab ·
      <a href="/privacy.html">Privacy</a> ·
      <a href="/disclosure.html">Disclosure</a>
    </p>
  </footer>
</body>
</html>
